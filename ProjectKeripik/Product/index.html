<script>
  const cards = document.querySelectorAll('.product-card');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('slide-in-visible');
        observer.unobserve(entry.target); // Optional: hanya jalankan sekali
      }
    });
  }, {
    threshold: 0.1
  });

  cards.forEach(card => {
    card.classList.add('slide-in');
    observer.observe(card);
  });
</script>

<!-- Script animasi tombol navbar -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggleButton = document.querySelector('[data-collapse-toggle]');
  toggleButton.addEventListener("click", function () {
    toggleButton.classList.remove("animate-rotate-in");
    void toggleButton.offsetWidth; // restart animation
    toggleButton.classList.add("animate-rotate-in");
  });
});
</script>
